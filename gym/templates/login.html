{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.login-container {
    display: flex;
    width: 850px;
    height: 500px;
    background: #0f172a;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* LEFT SIDE */
.left {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 40px;
}

/* OVERLAY */
.left::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

/* TEXT */
.left h1,
.left p {
    position: relative;
    z-index: 1;
    color: white;
}

.left h1 {
    font-size: 30px;
    margin-bottom: 10px;
}

.left p {
    opacity: 0.85;
}

/* RIGHT SIDE */
.right {
    flex: 1;
    background: #020617;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
}

.right h2 {
    color: white;
    margin-bottom: 20px;
}

/* INPUT */
.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

input::placeholder {
    color: #94a3b8;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1d4ed8;
}

/* ERROR */
.errorlist {
    color: #f87171;
    list-style: none;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    color: #94a3b8;
    font-size: 12px;
    text-align: center;
}
</style>
</head>

<body>

<div class="login-container">

    <!-- LEFT SIDE WITH IMAGE -->
    <div class="left" style="background: linear-gradient(135deg, #2563eb, #1e40af);">
        <h1>🏋️ Fitness Camp</h1>
        <p>Train hard. Stay strong.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="footer">
            Fitness Camp © 2026
        </div>
    </div>

</div>

</body>
</html>
