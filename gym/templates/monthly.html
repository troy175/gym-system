{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>📅 Monthly Plan</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- CUSTOMER (ONLY MEMBERS) -->
        <select name="customer" required>
            <option value="">Select member...</option>
            {% for c in customers %}
                <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
        </select>

        <!-- PLAN -->
        <label>Plan:</label>
        <select name="plan" id="plan" onchange="updatePrice()" required>
            <option value="">- Select Plan -</option>
            <option value="1_month">1 Month (1200)</option>
            <option value="3_months">3 Months (3000)</option>
            <option value="12_months">12 Months (5000)</option>
        </select>

        <label>Start Date:</label>
        <input type="date" name="start_date" onchange="updateEndDate()" required>


        <p id="price_display">Price: ₱0</p>

        <!-- 🔥 hidden price -->
        <input type="hidden" name="price" id="price_input">

        <!-- PAYMENT -->
        <input type="number" name="amount" placeholder="Amount Paid" oninput="computeChange()" required>

        <p id="change_display">Change: ₱0</p>

        <button class="btn" type="submit">Save</button>
    </form>

    <a class="btn" href="/">Back</a>
</div>

<script>
let price = 0;

function updatePrice() {
    let plan = document.getElementById('plan').value;

    if (plan === '1_month') price = 1200;
    else if (plan === '3_months') price = 3000;
    else if (plan === '12_months') price = 5000;
    else price = 0;

    document.getElementById('price_display').innerText = "Price: ₱" + price;
    document.getElementById('price_input').value = price;

    updateEndDate();
    computeChange();
}

function updateEndDate() {
    let startVal = document.querySelector('[name="start_date"]').value;
    let plan = document.getElementById('plan').value;

    if (!startVal || !plan) return;

    let start = new Date(startVal + 'T00:00:00'); // 🔥 fixes timezone bug

    if (plan === '1_month') start.setMonth(start.getMonth() + 1);
    else if (plan === '3_months') start.setMonth(start.getMonth() + 3);
    else if (plan === '12_months') start.setFullYear(start.getFullYear() + 1);

    let yyyy = start.getFullYear();
    let mm = String(start.getMonth() + 1).padStart(2, '0');
    let dd = String(start.getDate()).padStart(2, '0');

    document.querySelector('[name="end_date"]').value = `${yyyy}-${mm}-${dd}`;
}

function computeChange() {
    let amount = document.querySelector('[name="amount"]').value || 0;
    let change = amount - price;

    document.getElementById('change_display').innerText = "Change: ₱" + change;
}
</script>

{% endblock %}
