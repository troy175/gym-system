{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>👤 Members</h2>

    {% for m in members %}
        <p>
            {{ m.name }}
            Start: {{ m.start_date|default:"No data" }}
            End: {{ m.end_date|default:"No data" }}
            <a class="btn" href="/edit-member/{{ m.id }}/">Edit</a>
        </p>
    {% empty %}
        <p>No members</p>
    {% endfor %}

    <a class="btn" href="/">Back</a>
</div>

{% endblock %}
