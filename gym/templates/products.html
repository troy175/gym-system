{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>📦 Products (Inventory)</h2>

    {% for p in products %}
        <p>
            {{ p.name }} - ₱{{ p.price }} | Stock: {{ p.stock }}
            <a class="btn" href="/edit-product/{{ p.id }}/">Edit</a>
        </p>
    {% empty %}
        <p>No products</p>
    {% endfor %}

    <a class="btn" href="/add_inventory/">➕ Add Product</a>
    <a class="btn" href="/">Back</a>
</div>

{% endblock %}
