{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>👥 Customers</h2>

    {% for c in customers %}
        <p>
            {{ c.name }}
            <a class="btn" href="/edit-customer/{{ c.id }}/">Edit</a>
        </p>
    {% empty %}
        <p>No customers</p>
    {% endfor %}

    <a class="btn" href="/">Back</a>
</div>

{% endblock %}
