<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logged Out</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    background: #0f172a;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    width: 350px;
}

h2 {
    color: white;
    margin-bottom: 10px;
}

p {
    color: #94a3b8;
    margin-bottom: 20px;
}

a {
    display: inline-block;
    padding: 10px 20px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

a:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<div class="card">
    <h2>👋 Logged Out</h2>
    <p>You have successfully logged out.</p>

    <a href="/login/">Login Again</a>
</div>

</body>
</html>
