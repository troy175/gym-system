{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>💪 Daily Log</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- CUSTOMER -->
        <div style="display:flex; gap:10px; align-items:center;">
            <select name="customer" id="customer_select" style="flex:1;" required onchange="checkMembership()">
                <option value="">Select customer...</option>
                {% for c in customers %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>

            <a href="/add-customer/" class="btn">➕</a>
        </div>

        <!-- ENTRY TYPE -->
        <label>Entry:</label>
        <select name="entry_type" id="entry_type" onchange="toggleWalkin()">
            <option value="walkin" selected>Walk-in</option>
            <option value="monthly">Monthly</option>
        </select>

        <!-- WALKIN TYPE -->
        <div id="walkin_section">
            <label>Type:</label>
            <select name="walkin_type" onchange="updatePrice()">
                <option value="student">Student (95)</option>
                <option value="regular">Regular (100)</option>
            </select>
        </div>

        <!-- PRICE -->
        <p id="price_display">Price: ₱95</p>

        <!-- HIDDEN PRICE -->
        <input type="hidden" name="price" id="price_input" value="95">

        <!-- PAYMENT -->
        <div id="payment_section">
            <input type="number" id="amount_input" name="amount" placeholder="Amount Paid" oninput="computeChange()" required>
            <p id="change_display">Change: ₱0</p>
        </div>

        <button class="btn" type="submit">Confirm</button>
    </form>

    <a class="btn" href="/">Back</a>
</div>

<script>
let price = 95;

// 🔥 PASS MONTHLY USERS FROM DJANGO
let monthlyMembers = {{ monthly_ids|safe }};

// 🔥 AUTO DETECT MEMBERSHIP
function checkMembership() {
    let customerId = document.getElementById('customer_select').value;

    if (monthlyMembers.includes(parseInt(customerId))) {
        document.getElementById('entry_type').value = 'monthly';
    } else {
        document.getElementById('entry_type').value = 'walkin';
    }

    toggleWalkin();
}

// 🔥 TOGGLE UI
function toggleWalkin() {
    let type = document.getElementById('entry_type').value;
    let walkinSection = document.getElementById('walkin_section');
    let paymentSection = document.getElementById('payment_section');
    let amountInput = document.getElementById('amount_input');

    if (type === 'walkin') {
        walkinSection.style.display = 'block';
        paymentSection.style.display = 'block';
        amountInput.required = true;
        updatePrice();
    } else {
        walkinSection.style.display = 'none';

        price = 0;
        amountInput.value = 0;
        amountInput.required = false;
        paymentSection.style.display = 'none';

        document.getElementById('price_display').innerText = "Price: FREE (Monthly)";
        document.getElementById('price_input').value = 0;
        document.getElementById('change_display').innerText = "Change: ₱0";
    }
}

// 🔥 UPDATE PRICE
function updatePrice() {
    let type = document.querySelector('[name="walkin_type"]').value;

    if (type === 'student') price = 95;
    else price = 100;

    updateDisplay();
}

// 🔥 DISPLAY
function updateDisplay() {
    document.getElementById('price_display').innerText = "Price: ₱" + price;
    document.getElementById('price_input').value = price;
    computeChange();
}

// 🔥 CHANGE
function computeChange() {
    let amount = document.getElementById('amount_input').value || 0;
    let change = amount - price;

    document.getElementById('change_display').innerText = "Change: ₱" + change;
}
</script>

{% endblock %}
